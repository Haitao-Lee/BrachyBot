<?xml version="1.0" encoding="UTF-8"?>
<!--
  Brachybot logo (placeholder, to be replaced by user design later)
  Concept: A capital "B" in white inside a navy-teal circle, with a small
  filled dot representing a brachytherapy seed/source.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
  </defs>
  <!-- Outer rounded square (logo container) -->
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#bb)"/>
  <!-- "B" letterform constructed from simple shapes for legibility -->
  <g fill="#ffffff">
    <!-- vertical stem -->
    <rect x="14" y="10" width="9" height="44"/>
    <!-- top bowl -->
    <path d="M 23 10 H 38 a 10 10 0 0 1 0 20 H 23 V 21 H 36 a 5 5 0 0 0 0 -10 H 23 Z"/>
    <!-- bottom bowl -->
    <path d="M 23 30 H 40 a 12 12 0 0 1 0 24 H 23 V 41 H 38 a 6 6 0 0 0 0 -12 H 23 Z"/>
  </g>
  <!-- Tiny orange seed/source indicator dot -->
  <circle cx="50" cy="48" r="5" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
</svg>
